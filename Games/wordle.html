<html><head>
  <style>body,html,iframe{margin:0;padding:0;height:100%;width:100%;overflow:hidden}.forceIosScrolling{overflow:scroll;-webkit-overflow-scrolling:touch}</style>
<script src="https://apis.google.com/_/scs/abc-static/_/js/k=gapi.lb.en.ch0Jz-JlMrQ.O/m=gapi_rpc/rt=j/sv=1/d=1/ed=1/rs=AHpOoo_YD4KoV8fTh_kLhktsiThAm3yJ5A/cb=gapi.loaded_0?le=scs,fedcm_migration_mod" async=""></script><script src="https://apis.google.com/js/api.js?checkCookie=1" gapi_processed="true"></script></head>

<body>
<iframe id="innerFrame" name="innerFrame" sandbox="allow-scripts allow-popups allow-forms allow-same-origin allow-popups-to-escape-sandbox allow-downloads allow-storage-access-by-user-activation" frameborder="0" allowfullscreen="" src="https://mywordle.strivemath.com" style="overflow: auto;">
</iframe>

<script>
  let policy;
  if (window.trustedTypes && window.trustedTypes.createPolicy) {
    policy = window.trustedTypes.createPolicy('atari-gapi-loader', {
      createScriptURL: (url) => {
        if (url === 'https://apis.google.com/js/api.js?checkCookie=1') {
          return url;
        }
        throw new Error('Attempted to load unexpected script URL');
      }
    });
  }

  function loadGapi() {
    var loaderScript = document.createElement('script');
    var url = 'https://apis.google.com/js/api.js?checkCookie=1';
    if (policy) {
      loaderScript.src = policy.createScriptURL(url);
    } else {
      loaderScript.setAttribute('src', url);
    }
    loaderScript.onload = function() {
      this.onload = function() {};
      loadGapiClient();
    };
    loaderScript.onreadystatechange = function() {
      if (this.readyState === 'complete') {
        this.onload();
      }
    };
    (document.head || document.body || document.documentElement).appendChild(loaderScript);
  }

  function updateInnerFrame(url, enableInteraction, forceIosScrolling) {
    var urlEl = document.createElement('a');
    urlEl.setAttribute('href', url);
    if (urlEl.protocol != "https:" && urlEl.protocol != "http:") {
      // Do not allow updating the iframe's src to anything other than https or http (used for local
      // servers), specifically javascript:
      return;
    }
    var iframe = document.getElementById('innerFrame');
    iframe.src = url;
    iframe.onload = function() {
      gapi.rpc.call('..', 'innerFrameLoaded');
    };

    if (enableInteraction) {
      if (forceIosScrolling) {
        var iframeParent = iframe.parentElement;
        iframeParent.classList.add('forceIosScrolling');
      } else {
        iframe.style.overflow = 'auto';
      }
    } else {
      iframe.style.pointerEvents = 'none';
    }
  }

  function updateInnerIframeCode(userCode, enableInteraction, forceIosScrolling) {
    gapi.rpc.setup('innerFrame');
    gapi.rpc.call(
      'innerFrame',
      'updateUserHtmlFrame',
      undefined /* opt_callback */,
      userCode,
      enableInteraction,
      forceIosScrolling);
  }

  function onPostMessage(ev) {
    if (ev.data['magic'] != 'SHIC') {
      return;
    }
    var type = ev.data['type'];
    switch (type) {
      case 'resize':
        var height = ev.data['height'];
        gapi.rpc.call('..', 'resize', undefined /* opt_callback */, height);
    }
  }

  function onGapiInitialized() {
    // Inform the parent frame that GAPI has been initialized.
    gapi.rpc.call('..', 'gapiInitialized');
    gapi.rpc.register('updateInnerFrame', updateInnerFrame);
    gapi.rpc.register('updateInnerIframeCode', updateInnerIframeCode);
    window.addEventListener('message', onPostMessage);
  }

  function loadGapiClient() {
    gapi.load('gapi.rpc', onGapiInitialized);
  }

  if (document.readyState == 'complete') {
    loadGapi();
  } else {
    self.addEventListener('load', loadGapi);
  }
</script>


</body></html>
