<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supernova Games</title> <!-- change this to the title of the tab you want -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #6a4c9c;
            color: white;
        }
        header {
            background-color: #5e3b8f;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: flex-end;
        }
        header button {
            background-color: #7f5f9f;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 20px;
        }
        header button:hover {
            background-color: #9b6fcf;
        }
        .section {
            padding: 40px;
            text-align: center;
            background-color: #7f5f9f;
        }
        .game-card {
            display: inline-block;
            width: 200px;
            height: 250px;
            background-color: #8e6ba7;
            margin: 15px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            text-align: center;
        }
        .game-card img {
            width: 100%;
            height: 160px;
            border-radius: 10px 10px 0 0;
        }
        .game-card h3 {
            margin-top: 10px;
        }
        footer {
            background-color: #5e3b8f;
            color: white;
            text-align: center;
            padding: 20px 0;
        }
        iframe.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1000;
        }
    </style>
    <script>
        function openFullscreen(url) {
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.className = 'fullscreen';
            iframe.setAttribute('allowfullscreen', '');
            document.body.appendChild(iframe);

            iframe.onclick = () => {
                iframe.remove(); // closes the iframe once you click (remove this if not wanted)
            };
        }
    </script>
</head>
<body>
    <header>
        <button onclick="location.href='index.html'">Games</button>
        <button onclick="location.href='apps.html'">Apps</button>
        <button onclick="location.href='soundboard.html'">Soundboard</button>
        <button onclick="location.href='browser.html'">Browser</button>
        <button onclick="location.href='codeeditor.html'">Code Editor</button>
    </header>

<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/code-editor@main/">
    <title>supernova code editor</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <div id="editor-list">
        <h1>supernova code editor</h1>
        <h2>Either edit python code or html code.</h2>
        <button onclick="htmleditor()">HTML Editor</button>
        <button onclick="pythoneditor()">Python Editor</button>
    </div>
    <script>
        const singlefile = true;
        function htmleditor() {
            fetch("html.html").then(res => res.text()).then(html => {
                document.documentElement.innerHTML = html;
                document.documentElement.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                        newScript.type = oldScript.type;
                    }
                    document.body.appendChild(newScript);
                });
                try {
                    let singlefile = true;
                } catch (error) {}
            });
        }

        function pythoneditor() {
            fetch("python.html").then(res => res.text()).then(html => {
                document.documentElement.innerHTML = html;
                document.documentElement.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                        newScript.type = oldScript.type;
                    }
                    document.body.appendChild(newScript);
                });
                try {
                    let singlefile = true;
                } catch (error) {}
            });
        }
    </script>
