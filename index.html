    <script>
        const themes = [
            { name:'Neptune', pri:'#0af', sec:'#06f', ter:'#0df', r:[0,170,255], r2:[0,100,255] },
            { name:'Crimson', pri:'#f44', sec:'#a00', ter:'#f88', r:[255,68,68], r2:[170,0,0] },
            { name:'Emerald', pri:'#0e6', sec:'#093', ter:'#4fa', r:[0,230,100], r2:[0,153,51] },

        let themeIdx = 0;
        function applyTheme(t) {
            document.querySelectorAll('.battery-container').forEach(el => el.style.borderColor = t.pri);
            document.querySelectorAll('.battery-text').forEach(el => el.style.color = t.pri);
            document.querySelectorAll('.battery-wrapper').forEach(el => el.style.borderColor = t.pri);
            document.querySelectorAll('.battery-tip').forEach(el => el.style.background = t.pri);

            const clock = document.getElementById('neon-clock'); if (clock) { clock.style.color = t.pri; clock.style.textShadow = `0 0 8px ${t.pri}, 0 0 20px ${t.sec}`; clock.style.borderColor = `${t.pri}44`; }
            const clockDate = document.getElementById('clock-date'); if (clockDate) clockDate.style.color = t.sec;
            const form = document.getElementById('form'); if (form) { form.style.borderColor = t.pri; form.style.boxShadow = `0 0 12px ${t.pri}66, 0 0 30px ${t.sec}26`; }
            const input = document.getElementById('query'); if (input) input.style.color = t.pri;
            document.querySelectorAll('#form button').forEach(el => el.style.color = t.pri);
            const ct = document.getElementById('center-text'); if (ct) { ct.style.background = `linear-gradient(90deg, ${t.pri}, ${t.sec}, ${t.ter}, ${t.pri})`; ct.style.backgroundSize = '400% 400%'; ct.style.webkitBackgroundClip = 'text'; ct.style.webkitTextFillColor = 'transparent'; ct.style.filter = `brightness(1.2) saturate(1.4) drop-shadow(0 0 6px ${t.pri}) drop-shadow(0 0 14px ${t.sec})`; }
            const sub = document.getElementById('subtitle'); if (sub) { sub.style.color = t.sec; sub.style.textShadow = `0 0 6px ${t.sec}`; }
            document.querySelectorAll('.nav-pill').forEach(el => { el.style.color = t.sec; el.style.borderColor = `${t.sec}44`; });
            const ann = document.getElementById('announcement'); if (ann) { ann.style.color = t.pri; ann.style.borderColor = `${t.sec}88`; }
